<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0808">
<title>Babajan Movlyanov</title>
<meta name="description" content="Interactive detective portfolio — 8 classified files">
<meta property="og:title" content="Babajan Movlyanov — Classified File">
<meta property="og:image" content="scenes/scene1.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  background:#0a0808;
  overflow-x:hidden;
  font-family:'Special Elite','Courier New',monospace;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* ── LANG BAR ──────────────────────────────────────── */
#lang-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:200;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  padding:9px 16px;
  padding-bottom:max(9px,env(safe-area-inset-bottom));
  background:rgba(6,4,4,0.93);
  border-top:1px solid rgba(255,255,255,0.07);
  transform:translateZ(0);
  will-change:transform;
}
#lang-bar::before{
  content:'FILE VIEW:';
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.22);
  margin-right:6px;
}
.lang-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.32);
  padding:5px 18px;
  cursor:pointer;
  border-radius:2px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  font-weight:600;
  letter-spacing:2px;
  transition:background .18s,border-color .18s,color .18s;
  min-height:36px;
  -webkit-tap-highlight-color:transparent;
}
.lang-btn.active{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.38);
  color:#fff;
}

/* ── SCENE ─────────────────────────────────────────── */
#scroll-main{padding-bottom:58px}

.scene{
  position:relative;
  width:100%;
  overflow:hidden;
  contain:layout style;
  content-visibility:auto;
}
.scene:first-child{
  content-visibility:visible;
}
.scene-bg{
  display:block;
  width:100%;
  height:auto;
  pointer-events:none;
  -webkit-user-drag:none;
}
.hotspot-layer{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

/* ── HOTSPOTS ──────────────────────────────────────── */
.hotspot{
  position:absolute;
  background:transparent;
  border:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
  border-radius:2px;
}

/* NOTE — disabled in EN mode */
.hotspot-note{
  cursor:default;
  pointer-events:none;
}
body.lang-tr .hotspot-note,
body.lang-ru .hotspot-note{
  pointer-events:auto;
  cursor:crosshair;
}
body.lang-tr .hotspot-note:hover,
body.lang-ru .hotspot-note:hover{
  background:rgba(0,255,160,0.04);
  box-shadow:inset 0 0 0 1px rgba(0,255,160,0.14);
}

/* PHOTO */
.hotspot-photo{
  cursor:zoom-in;
  pointer-events:auto;
  transition:box-shadow .2s;
}
.hotspot-photo:hover{
  box-shadow:
    inset 5px 5px 0 rgba(255,255,255,0.2),
    inset -5px -5px 0 rgba(255,255,255,0.2),
    inset 5px -5px 0 rgba(255,255,255,0.2),
    inset -5px 5px 0 rgba(255,255,255,0.2);
}

/* INFO — persistent pulse */
.hotspot-info{
  cursor:pointer;
  pointer-events:auto;
  border-radius:4px;
}
.hotspot-info[data-info-type="whatsapp"]{animation:p-wa 2.8s ease-in-out infinite}
.hotspot-info[data-info-type="instagram"]{animation:p-ig 2.8s ease-in-out infinite}
.hotspot-info[data-info-type="gmail"]{animation:p-gm 2.8s ease-in-out infinite}
body.scrolling .hotspot-info{animation-play-state:paused}

@keyframes p-wa{
  0%,100%{box-shadow:0 0 0 1px rgba(37,211,102,.18)}
  50%{box-shadow:0 0 10px 1px rgba(37,211,102,.42)}
}
@keyframes p-ig{
  0%,100%{box-shadow:0 0 0 1px rgba(225,48,108,.18)}
  50%{box-shadow:0 0 10px 1px rgba(225,48,108,.42)}
}
@keyframes p-gm{
  0%,100%{box-shadow:0 0 0 1px rgba(234,67,53,.18)}
  50%{box-shadow:0 0 10px 1px rgba(234,67,53,.42)}
}

/* ── NOTE OVERLAY ──────────────────────────────────── */
.note-dim{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.15);
  z-index:20;
  touch-action:auto;
}
.hotspot-note.focused{
  z-index:25;
  box-shadow:
    0 0 0 2px rgba(0,255,170,0.5),
    0 0 18px 6px rgba(0,255,170,0.28),
    0 0 48px 12px rgba(0,255,170,0.10);
  border-radius:2px;
}
.note-card{
  position:absolute;
  z-index:30;
  padding:10px 13px;
  min-width:55%;
  max-width:calc(100% - 4%);
  background:rgba(0,10,28,0.93);
  border:1px solid rgba(0,255,170,0.32);
  border-radius:3px;
  box-shadow:
    0 0 20px rgba(0,255,170,0.16),
    0 0 55px rgba(0,255,170,0.05),
    inset 0 0 20px rgba(0,255,170,0.04);
  color:#b0fce2;
  font-family:'Special Elite','Courier New',monospace;
  font-size:clamp(10px,2.8vw,13px);
  line-height:1.65;
  white-space:pre-wrap;
  word-break:break-word;
  animation:holo-in .22s ease-out;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  background-image:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,255,170,0.013) 2px,rgba(0,255,170,0.013) 4px
  );
}
.note-card::before{
  content:'';
  display:block;
  height:1px;
  margin:-10px -13px 9px;
  background:linear-gradient(90deg,transparent,rgba(0,255,170,0.55),transparent);
}
@keyframes holo-in{
  from{opacity:0;transform:scaleY(.75);transform-origin:top center}
  to{opacity:1;transform:scaleY(1)}
}

/* ── PHOTO MODAL ───────────────────────────────────── */
#photo-modal{
  display:none;
  position:fixed;
  inset:0;
  z-index:300;
  align-items:center;
  justify-content:center;
}
#photo-modal.open{display:flex}

#photo-backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.42);
  backdrop-filter:blur(16px) brightness(.58);
  -webkit-backdrop-filter:blur(16px) brightness(.58);
}
#photo-frame{
  position:relative;
  z-index:1;
  background:#f2ebd8;
  padding:10px 10px 34px;
  max-width:74vw;
  max-height:74vh;
  box-shadow:
    0 2px 6px rgba(0,0,0,0.2),
    0 10px 30px rgba(0,0,0,0.55),
    0 30px 70px rgba(0,0,0,0.5);
  transform:rotate(-2deg);
  animation:photo-open .32s cubic-bezier(.34,1.4,.64,1);
}
#photo-frame img{
  display:block;
  max-width:100%;
  max-height:calc(74vh - 64px);
  object-fit:contain;
}
.photo-hint{
  position:absolute;
  bottom:9px;left:0;right:0;
  text-align:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:1.5px;
  color:rgba(0,0,0,0.28);
}
@keyframes photo-open{
  from{opacity:0;transform:rotate(-6deg) scale(.3)}
  to{opacity:1;transform:rotate(-2deg) scale(1)}
}

/* ── LOADER ────────────────────────────────────────── */
#loader{
  position:fixed;inset:0;z-index:400;
  background:#0a0808;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  transition:opacity .5s;
}
#loader-line{
  width:48px;height:1px;
  background:rgba(255,255,255,0.15);
  animation:ld-exp 1.2s ease-in-out infinite;
}
#loader-text{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:3px;
  color:rgba(255,255,255,0.3);
  animation:blink 1.2s step-end infinite;
}
@keyframes ld-exp{0%,100%{width:30px;opacity:.15}50%{width:70px;opacity:.45}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.7}}
</style>
</head>
<body class="lang-en">

<!-- Language bar -->
<div id="lang-bar">
  <button class="lang-btn active" data-lang="en">EN</button>
  <button class="lang-btn"        data-lang="tr">TR</button>
  <button class="lang-btn"        data-lang="ru">RU</button>
</div>

<!-- Scenes injected here -->
<main id="scroll-main"></main>

<!-- Photo modal -->
<div id="photo-modal">
  <div id="photo-backdrop"></div>
  <div id="photo-frame">
    <img id="photo-img" src="" alt="">
    <div class="photo-hint">TAP ANYWHERE TO CLOSE</div>
  </div>
</div>

<!-- Loader -->
<div id="loader">
  <div id="loader-line"></div>
  <div id="loader-text">LOADING CLASSIFIED FILES…</div>
</div>

<script>
// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let lang = localStorage.getItem('bab_lang') || 'en';
let activeNote = null;
let tsX = 0, tsY = 0, tsT = 0;

// ════════════════════════════════════════════
// LANGUAGE SWITCHER
// ════════════════════════════════════════════
function setLang(l) {
  lang = l;
  localStorage.setItem('bab_lang', l);
  document.body.className = 'lang-' + l;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === l)
  );
  closeNote();
  closePhoto();
}

document.querySelectorAll('.lang-btn')
  .forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));

// ════════════════════════════════════════════
// SCENE RENDERER
// ════════════════════════════════════════════
function renderScene(data) {
  const sec = document.createElement('section');
  sec.className = 'scene';
  sec.id = 'scene-' + data.scene;

  // Background image
  const img = document.createElement('img');
  img.className = 'scene-bg';
  img.src = data.bg_image;
  img.alt = data.title_en || '';
  img.loading = data.scene === 1 ? 'eager' : 'lazy';
  img.decoding = 'async';

  // Hotspot overlay layer
  const layer = document.createElement('div');
  layer.className = 'hotspot-layer';

  (data.hotspots || []).forEach(hs => {
    const el = document.createElement('div');
    el.className = 'hotspot hotspot-' + hs.type;
    el.style.left   = hs.x_pct + '%';
    el.style.top    = hs.y_pct + '%';
    el.style.width  = hs.w_pct + '%';
    el.style.height = hs.h_pct + '%';
    el.dataset.type = hs.type;

    if (hs.type === 'note') {
      el.dataset.en = hs.en_text || '';
      el.dataset.tr = hs.tr_text || '';
      el.dataset.ru = hs.ru_text || '';
    } else if (hs.type === 'photo') {
      el.dataset.src = hs.src || '';
    } else if (hs.type === 'info') {
      el.dataset.url      = hs.url || '#';
      el.dataset.infoType = hs.info_type || '';
    }

    wire(el);
    layer.appendChild(el);
  });

  sec.appendChild(img);
  sec.appendChild(layer);
  return sec;
}

// ════════════════════════════════════════════
// TAP vs SCROLL detection
// ════════════════════════════════════════════
function wire(el) {
  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    tsX = t.clientX; tsY = t.clientY; tsT = Date.now();
  }, { passive: true });

  el.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    const dx = Math.abs(t.clientX - tsX);
    const dy = Math.abs(t.clientY - tsY);
    // Only fire if movement < 10px and under 420ms
    if (dx < 10 && dy < 10 && Date.now() - tsT < 420) {
      e.preventDefault();
      e.stopPropagation();
      activate(el);
    }
  });

  // Desktop click
  el.addEventListener('click', e => {
    e.stopPropagation();
    activate(el);
  });
}

function activate(el) {
  const type = el.dataset.type;
  if (type === 'note') {
    if (lang === 'en') return; // EN: notes are decorative, no overlay
    const text = el.dataset[lang] || el.dataset.en || '';
    if (text) showNote(el, text);
  } else if (type === 'photo') {
    showPhoto(el.dataset.src);
  } else if (type === 'info') {
    const url = el.dataset.url;
    if (url && url !== '#') window.open(url, '_blank', 'noopener,noreferrer');
  }
}

// ════════════════════════════════════════════
// NOTE OVERLAY — hologram effect
// ════════════════════════════════════════════
function showNote(el, text) {
  closeNote();

  const layer = el.closest('.hotspot-layer');
  const scene = el.closest('.scene');

  // Focus glow on the tapped note
  el.classList.add('focused');

  // Very light scene dim (no blur)
  const dim = document.createElement('div');
  dim.className = 'note-dim';
  const dismiss = (e) => { e?.preventDefault(); e?.stopPropagation(); closeNote(); };
  dim.addEventListener('click', dismiss);
  dim.addEventListener('touchend', dismiss);
  layer.appendChild(dim);

  // Hologram card — same % position as hotspot
  const card = document.createElement('div');
  card.className = 'note-card';
  card.style.left  = el.style.left;
  card.style.top   = el.style.top;
  card.style.width = el.style.width;
  card.textContent = text;

  card.addEventListener('click', e => e.stopPropagation());
  card.addEventListener('touchend', e => e.stopPropagation());
  layer.appendChild(card);

  // Viewport clamp — shift card if it overflows scene bottom or right edge
  requestAnimationFrame(() => {
    const sh = scene.offsetHeight;
    const sw = scene.offsetWidth;
    const topPx  = parseFloat(el.style.top)  / 100 * sh;
    const leftPx = parseFloat(el.style.left) / 100 * sw;

    const cardH = card.offsetHeight;
    const cardW = card.offsetWidth;

    if (topPx + cardH > sh * 0.98) {
      card.style.top = Math.max(1, (sh * 0.98 - cardH) / sh * 100) + '%';
    }
    if (leftPx + cardW > sw * 0.99) {
      card.style.left = Math.max(1, (sw * 0.99 - cardW) / sw * 100) + '%';
    }
  });

  activeNote = { dim, card, el };
}

function closeNote() {
  if (!activeNote) return;
  activeNote.el.classList.remove('focused');
  activeNote.dim.remove();
  activeNote.card.remove();
  activeNote = null;
}

// Pause animations during scroll to reduce jank
let scrollTimer;
window.addEventListener('scroll', () => {
  document.body.classList.add('scrolling');
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => document.body.classList.remove('scrolling'), 150);
}, { passive: true });

// Scene background tap closes note
document.addEventListener('click', e => {
  if (!activeNote) return;
  const t = e.target;
  if (t.classList.contains('scene-bg') ||
      t.classList.contains('hotspot-layer') ||
      t.classList.contains('scene')) {
    closeNote();
  }
});

// ════════════════════════════════════════════
// PHOTO MODAL — polaroid zoom effect
// ════════════════════════════════════════════
const modal    = document.getElementById('photo-modal');
const backdrop = document.getElementById('photo-backdrop');
const photoImg = document.getElementById('photo-img');
const frame    = document.getElementById('photo-frame');

function showPhoto(src) {
  if (!src) return;
  closeNote();
  photoImg.src = 'originals/' + src;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePhoto() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { photoImg.src = ''; }, 360);
}

// Tap anywhere in modal to close
[backdrop, frame].forEach(el => {
  el.addEventListener('click', closePhoto);
  el.addEventListener('touchend', e => { e.preventDefault(); closePhoto(); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePhoto(); closeNote(); }
});

// ════════════════════════════════════════════
// INIT — fetch all 8 scene JSONs, render
// ════════════════════════════════════════════
(async () => {
  // Apply saved language immediately
  document.body.className = 'lang-' + lang;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );

  const main   = document.getElementById('scroll-main');
  const loader = document.getElementById('loader');

  try {
    const jsons = await Promise.all(
      [1,2,3,4,5,6,7,8].map(n =>
        fetch('scene_' + String(n).padStart(2,'0') + '.json')
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      )
    );
    jsons.forEach(d => main.appendChild(renderScene(d)));
  } catch (err) {
    document.getElementById('loader-text').textContent = 'ERROR — FILE ACCESS DENIED';
    console.error('Scene load failed:', err);
    return;
  }

  // Fade out loader
  loader.style.opacity = '0';
  setTimeout(() => loader.remove(), 520);
})();
</script>
</body>
</html>
