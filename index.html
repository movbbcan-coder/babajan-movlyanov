<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>THE GHOST — Case File: Active</title>
<meta name="description" content="Babajan Movlyanov — Detective Case File Portfolio. Alanya, Turkey."/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{background:#0a0806;overflow-x:hidden;cursor:none}

/* ── CURSOR ── */
#cursor-dot{position:fixed;width:8px;height:8px;border-radius:50%;background:#e74c3c;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
#cursor-ring{position:fixed;width:32px;height:32px;border-radius:50%;border:1px solid rgba(231,76,60,.5);pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s}
body.ch #cursor-ring{width:48px;height:48px;border-color:#e74c3c}

/* ── PROGRESS ── */
#pb{position:fixed;top:0;left:0;height:2px;width:0%;background:#e74c3c;z-index:9999;box-shadow:0 0 8px #e74c3c;transition:width .1s linear}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;z-index:9990;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
  background-size:200px;animation:grain .5s steps(1) infinite}
@keyframes grain{0%{background-position:0 0}25%{background-position:-5% 10%}50%{background-position:15% -5%}75%{background-position:-10% 20%}100%{background-position:5% 0}}

/* ── LAMP GLOW ── */
#lamp{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.06) 0%,transparent 70%);pointer-events:none;z-index:1;transform:translate(-50%,-50%);transition:left .5s ease,top .5s ease}

/* ── LANG ── */
#lang{position:fixed;top:16px;right:16px;z-index:1000;display:flex;gap:5px}
.lb{padding:5px 12px;font-family:'Special Elite',cursive;font-size:.7rem;letter-spacing:2px;border:1px solid rgba(192,57,43,.4);background:rgba(10,8,6,.9);color:#6b5a3e;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.lb.on{background:#c0392b;color:#fff;border-color:#c0392b;box-shadow:0 0 10px rgba(192,57,43,.4)}
.lb:hover:not(.on){color:#f5f0e8;border-color:#e74c3c}

/* ── MAIN BOARD ── */
#board{display:block;background:#0a0806;position:relative;z-index:2}

/* ── SCENE BLOCKS ── */
.sb{display:block;line-height:0;cursor:zoom-in;position:relative}
.sb img{width:100%;display:block;margin:0;padding:0;line-height:0;vertical-align:bottom}
.sb:hover img{filter:brightness(1.06)}

/* ── CONTACT SECTION (scene 8 below) ── */
#contact{background:#0a0806;padding:40px 20px 60px;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;z-index:2}
#contact::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:rgba(139,105,20,.25)}
.cn{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;width:100%;max-width:380px;transition:transform .25s;position:relative}
.cn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(192,57,43,.15);transition:width .25s}
.cn:hover{transform:translateX(5px)}
.cn:hover::before{width:3px}
.cn-s{padding:13px 18px;font-family:'Special Elite',cursive;font-size:.82rem;line-height:1.6;box-shadow:2px 3px 10px rgba(0,0,0,.5);cursor:pointer;max-width:380px;width:100%;transition:transform .25s,box-shadow .25s}
.cn-s:hover{transform:translateX(5px) rotate(0deg) !important;box-shadow:4px 6px 16px rgba(0,0,0,.7)}
.sy{background:#f9e94e;color:#333;transform:rotate(-1deg)}
.sw{background:#fff;color:#333;border:1px solid #ddd;transform:rotate(.5deg)}
.ci{font-size:1.2rem;flex-shrink:0}
.cl{font-family:'Special Elite',cursive;font-size:.6rem;color:#6b5a3e;letter-spacing:1px;text-transform:uppercase}
.cv{font-family:'Special Elite',cursive;font-size:.9rem;color:#1a1208;font-weight:600;margin-top:2px}
.cs{font-family:'Bebas Neue',cursive;font-size:.7rem;letter-spacing:3px;color:rgba(192,57,43,.5);text-align:center;margin-top:8px}

/* ── LIGHTBOX ── */
#lb{position:fixed;inset:0;z-index:99000;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center}
#lb.open{display:flex}
#lbw{overflow:hidden;max-width:96vw;max-height:92vh;cursor:grab;position:relative;line-height:0}
#lbw.g{cursor:grabbing}
#lbi{display:block;max-width:96vw;max-height:92vh;object-fit:contain;transform-origin:center center;transition:transform .15s;user-select:none;-webkit-user-drag:none;line-height:0}
#lbc{position:fixed;top:16px;right:20px;font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:2px;color:#e74c3c;background:none;border:none;cursor:pointer;z-index:99001;transition:transform .2s,color .2s;padding:8px}
#lbc:hover{transform:scale(1.2);color:#fff}
#lbz{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-family:'Special Elite',cursive;font-size:.7rem;letter-spacing:3px;color:#c9a84c;background:rgba(0,0,0,.65);padding:4px 14px;pointer-events:none;z-index:99001}

/* ── CONTEXT MENU ── */
#ctx{position:fixed;z-index:99500;background:rgba(10,8,6,.97);border:1px solid rgba(192,57,43,.4);min-width:176px;box-shadow:4px 4px 20px rgba(0,0,0,.8);display:none}
.ci2{padding:9px 14px;font-family:'Special Elite',cursive;font-size:.78rem;color:#f5f0e8;cursor:pointer;letter-spacing:1px;transition:background .2s;display:flex;align-items:center;gap:8px}
.ci2:hover{background:rgba(192,57,43,.2);color:#e74c3c}
.cs2{border-top:1px solid rgba(139,105,20,.2);margin:3px 0}

/* ── TOAST ── */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:8px 20px;font-family:'Special Elite',cursive;font-size:.78rem;letter-spacing:2px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;box-shadow:0 4px 20px rgba(192,57,43,.4)}
#toast.show{opacity:1}

/* ── EASTER EGGS ── */
@keyframes glitch{0%{transform:none;filter:none}15%{transform:translate(-4px,2px);filter:hue-rotate(90deg)}30%{transform:translate(4px,-2px);filter:hue-rotate(180deg) saturate(3)}50%{transform:translate(-2px,4px) skewX(2deg);filter:invert(.3)}70%{transform:none;filter:none}85%{transform:translate(-3px,1px);filter:saturate(4)}100%{transform:none;filter:none}}
body.glitch{animation:glitch .6s linear}
#ghost{position:fixed;bottom:76px;right:24px;background:#0e0303;border:1px solid #c0392b;color:#e74c3c;padding:9px 16px;font-family:'Special Elite',cursive;font-size:.85rem;letter-spacing:2px;z-index:9998;opacity:0;transition:opacity .4s;pointer-events:none;box-shadow:0 0 18px rgba(192,57,43,.3)}
#ghost.on{opacity:1}
#acc{position:fixed;inset:0;z-index:99800;background:rgba(0,0,0,0);pointer-events:none;display:flex;align-items:center;justify-content:center;transition:background .3s}
#acc.on{background:rgba(192,57,43,.15)}
#acct{font-family:'Bebas Neue',cursive;font-size:clamp(2rem,8vw,4.5rem);letter-spacing:10px;color:#e74c3c;opacity:0;transform:scale(.4);transition:opacity .2s,transform .35s cubic-bezier(.34,1.56,.64,1);text-shadow:0 0 30px rgba(231,76,60,.8)}
#acc.on #acct{opacity:1;transform:scale(1)}
#idle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,8,6,.95);border:1px solid rgba(139,105,20,.4);color:#f5f0e8;padding:20px 28px;font-family:'Special Elite',cursive;font-size:.92rem;letter-spacing:2px;z-index:9997;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;line-height:1.9}
#idle.on{opacity:1}
#idle em{color:#c9a84c;display:block;font-style:normal;font-size:1.1rem;margin-bottom:4px}

@media(max-width:600px){#lang{top:10px;right:10px;gap:3px}.lb{padding:4px 8px;font-size:.6rem}.sb:hover img{filter:none}}
</style>
</head>
<body>

<!-- UI ELEMENTS -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<div id="pb"></div>
<div id="grain"></div>
<div id="lamp"></div>

<div id="lang">
  <button class="lb on" onclick="setLang('en')">EN</button>
  <button class="lb" onclick="setLang('tr')">TR</button>
  <button class="lb" onclick="setLang('ru')">RU</button>
</div>

<!-- EASTER EGG ELEMENTS -->
<div id="ghost">&#128123; The Ghost was here.</div>
<div id="acc"><div id="acct">ACCESS GRANTED</div></div>
<div id="idle">
  <em data-en="Still there?" data-tr="Hâlâ buradasın?" data-ru="Ты ещё здесь?">Still there?</em>
  <span data-en="The Ghost is watching." data-tr="Hayalet izliyor." data-ru="Призрак наблюдает.">The Ghost is watching.</span>
</div>
<div id="toast">COPIED &#10003;</div>

<!-- CONTEXT MENU -->
<div id="ctx">
  <div class="ci2" onclick="hCtx()">&#128308; Classified</div>
  <div class="ci2" onclick="hCtx()">&#128204; Pin This</div>
  <div class="cs2"></div>
  <div class="ci2" onclick="hCtx()">&#128065; You're being watched</div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="if(event.target===this)lbClose()">
  <button id="lbc" onclick="lbClose()">&#10005; CLOSE</button>
  <div id="lbw"><img id="lbi" src="" alt=""/></div>
  <div id="lbz">100%</div>
</div>

<!-- ═══════════════════════════════
     MAIN BOARD — 8 SCENES STACKED
═══════════════════════════════ -->
<main id="board">

  <!-- SCENE 1 — KAPAK -->
  <div class="sb" id="s1" onclick="lbOpen(this)" data-ts="1">

<!-- CONTACT BELOW SCENE 8 -->
<section id="contact">
  <div class="cs" data-en="— REACH THE GHOST —" data-tr="— HAYALET'E ULAŞ —" data-ru="— СВЯЗАТЬСЯ С ПРИЗРАКОМ —">— REACH THE GHOST —</div>
  <div class="cn-s sy" onclick="copyText('movbbcan@gmail.com')">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="ci">&#128231;</div>

    <div style="display:flex;align-items:center;gap:12px">
      <div class="ci">&#128241;</div>
      <div><div class="cl" data-en="Phone · Turkey" data-tr="Telefon · Türkiye" data-ru="Телефон · Турция">Phone · Turkey</div><div class="cv">+90 506 987 22 23</div></div>
    </div>
  </div>
  <div class="cn-s sy" onclick="copyText('@mov.bbcan')" style="transform:rotate(-0.5deg)">
    <div style="display:flex;align-items:center;gap:12px">

      <div><div class="cl">Instagram</div><div class="cv">@mov.bbcan</div></div>
    </div>
  </div>
  <div class="cs" style="margin-top:16px;opacity:.35;font-size:.6rem">&#169; 2026 Babajan Movlyanov · Alanya, Turkey</div>
</section>

<script>
/* ── CURSOR ── */
const DOT=document.getElementById('cursor-dot'),RING=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  DOT.style.left=mx+'px';DOT.style.top=my+'px';
  document.getElementById('lamp').style.left=mx+'px';
  document.getElementById('lamp').style.top=my+'px';
  resetIdle();
},{passive:true});
(function loop(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;RING.style.left=rx+'px';RING.style.top=ry+'px';requestAnimationFrame(loop)})();
document.querySelectorAll('button,.sb,.cn-s,.lb').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));
});
window.addEventListener('touchstart',()=>{DOT.style.display='none';RING.style.display='none'},{once:true,passive:true});

/* ── PROGRESS BAR ── */
window.addEventListener('scroll',()=>{
  const pct=window.scrollY/(document.body.scrollHeight-window.innerHeight)*100;
  document.getElementById('pb').style.width=Math.min(pct,100)+'%';
},{passive:true});

/* ── LANGUAGE ── */
function setLang(l){
  document.querySelectorAll('[data-en]').forEach(el=>{
    const v=el.getAttribute('data-'+l);
    if(v)el.innerHTML=v;
  });
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
  document.querySelector('.lb[onclick="setLang(\''+l+'\')"]').classList.add('on');
  document.documentElement.lang=l;
  localStorage.setItem('ghost_lang',l);
}
const sl=localStorage.getItem('ghost_lang');
if(sl&&sl!=='en')setLang(sl);

/* ── LIGHTBOX ── */
let lbS=1,lbDrag=false,lbSX=0,lbSY=0,lbTX=0,lbTY=0,pinchD=0;
const LB=document.getElementById('lb'),LBI=document.getElementById('lbi'),
      LBW=document.getElementById('lbw'),LBZ=document.getElementById('lbz');

function lbOpen(el){
  const img=el.querySelector('img');
  if(!img)return;
  LBI.src=img.src;
  lbS=1;lbTX=0;lbTY=0;
  LBI.style.transform='scale(1) translate(0,0)';
  LBZ.textContent='100%';
  LB.classList.add('open');
  document.body.style.overflow='hidden';
}
function lbClose(){
  LB.classList.remove('open');
  document.body.style.overflow='';
}
function lbUpdate(){
  LBI.style.transform=`scale(${lbS}) translate(${lbTX/lbS}px,${lbTY/lbS}px)`;
  LBZ.textContent=Math.round(lbS*100)+'%';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose()});

/* wheel zoom */
LBW.addEventListener('wheel',e=>{
  e.preventDefault();
  lbS=Math.min(4,Math.max(.4,lbS+e.deltaY*-.0025));
  lbUpdate();
},{passive:false});

/* double click reset */
LBW.addEventListener('dblclick',()=>{lbS=1;lbTX=0;lbTY=0;lbUpdate()});

/* drag */
LBW.addEventListener('mousedown',e=>{lbDrag=true;lbSX=e.clientX-lbTX;lbSY=e.clientY-lbTY;LBW.classList.add('g')});
window.addEventListener('mousemove',e=>{if(!lbDrag)return;lbTX=e.clientX-lbSX;lbTY=e.clientY-lbSY;lbUpdate()});
window.addEventListener('mouseup',()=>{lbDrag=false;LBW.classList.remove('g')});

/* touch pinch */
LBW.addEventListener('touchstart',e=>{
  if(e.touches.length===2)
    pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
LBW.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    lbS=Math.min(4,Math.max(.4,lbS*(d/pinchD)));
    pinchD=d;lbUpdate();
  }
},{passive:true});

/* tap to open on touch */
document.querySelectorAll('.sb').forEach(sb=>{
  sb.addEventListener('touchend',e=>{
    if(e.changedTouches.length===1)lbOpen(sb);
  },{passive:true});
});

/* ── COPY ── */
function copyText(t){
  navigator.clipboard.writeText(t).then(()=>{
    const el=document.getElementById('toast');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1800);
  });
}

/* ── CONTEXT MENU ── */
const CTX=document.getElementById('ctx');
document.addEventListener('contextmenu',e=>{
  e.preventDefault();
  CTX.style.display='block';
  CTX.style.left=Math.min(e.clientX,window.innerWidth-186)+'px';
  CTX.style.top=Math.min(e.clientY,window.innerHeight-115)+'px';
});
document.addEventListener('click',()=>CTX.style.display='none');
function hCtx(){CTX.style.display='none'}

/* ── EASTER EGG: "GHOST" key sequence ── */
let buf='';
document.addEventListener('keydown',e=>{
  buf=(buf+e.key.toLowerCase()).slice(-5);
  if(buf==='ghost'){
    document.body.classList.add('glitch');
    setTimeout(()=>document.body.classList.remove('glitch'),700);
    const gn=document.getElementById('ghost');
    gn.classList.add('on');
    setTimeout(()=>gn.classList.remove('on'),3200);
    buf='';
  }
});

/* ── EASTER EGG: scene1 triple click (TOP SECRET stamp in image) ── */
let tc=0,tt;
document.getElementById('s1').addEventListener('click',()=>{
  tc++;clearTimeout(tt);
  tt=setTimeout(()=>tc=0,700);
  if(tc>=3){
    tc=0;
    // Web Audio beep
    try{
      const ac=new(window.AudioContext||window.webkitAudioContext)();
      [440,660,880].forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.frequency.value=f;o.type='square';
        g.gain.setValueAtTime(.1,ac.currentTime+i*.12);
        g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.12+.1);
        o.start(ac.currentTime+i*.12);
        o.stop(ac.currentTime+i*.12+.12);
      });
    }catch(_){}
    const ov=document.getElementById('acc');
    ov.classList.add('on');
    setTimeout(()=>ov.classList.remove('on'),2400);
  }
});

/* ── IDLE 30s ── */
let idleT;
function resetIdle(){
  clearTimeout(idleT);
  document.getElementById('idle').classList.remove('on');
  idleT=setTimeout(()=>document.getElementById('idle').classList.add('on'),30000);
}
['mousemove','keydown','scroll','touchstart'].forEach(ev=>
  document.addEventListener(ev,resetIdle,{passive:true})
);
resetIdle();
</script>
</body>
</html>
